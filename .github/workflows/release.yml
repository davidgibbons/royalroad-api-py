name: Release

# Build the wheel + sdist and attach them to a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed.
#
# NOTE: GitHub Packages has no Python (PyPI-style) registry, so the artifacts
# are published as GitHub Release assets. Install them with, e.g.:
#   pip install https://github.com/davidgibbons/royalroad-api-py/releases/download/v0.1.0/royalroad_api-0.1.0-py3-none-any.whl
# or straight from source:
#   pip install "git+https://github.com/davidgibbons/royalroad-api-py@v0.1.0"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build + test deps
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c 'import royalroad_api; print(royalroad_api.__version__)')"
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package version $PKG (bump __version__/pyproject)"
            exit 1
          fi

      - name: Build wheel and sdist
        run: python -m build

      - name: Check artifact metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
