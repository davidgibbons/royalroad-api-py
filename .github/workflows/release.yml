name: Release

# Tag and release on manual trigger. Run this from the Actions tab (or via
# `gh workflow run Release`). It reads `__version__` and, if no matching
# `v<version>` tag exists yet, creates the tag, builds the wheel + sdist, and
# attaches them to a fresh GitHub Release. If the tag already exists, it does
# nothing — so bump `__version__` before running.
#
# NOTE: GitHub Packages has no Python (PyPI-style) registry, so the artifacts
# are published as GitHub Release assets. Install them with, e.g.:
#   pip install https://github.com/davidgibbons/royalroad-api-py/releases/download/v0.1.0/royalroad_api-0.1.0-py3-none-any.whl
# or straight from source:
#   pip install "git+https://github.com/davidgibbons/royalroad-api-py@v0.1.0"

on:
  workflow_dispatch:

permissions:
  contents: write # required to push the tag and create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read version and check for existing tag
        id: check
        run: |
          VERSION="$(grep -oE '__version__ = "[^"]+"' src/royalroad_api/__init__.py | cut -d'"' -f2)"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read __version__ from src/royalroad_api/__init__.py"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists — nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New version v$VERSION — will tag and release."
          fi

      - name: Set up Python
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build + test deps
        if: steps.check.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip build twine
          pip install -e ".[dev]"

      - name: Run tests
        if: steps.check.outputs.exists == 'false'
        run: pytest -q

      - name: Build wheel and sdist
        if: steps.check.outputs.exists == 'false'
        run: python -m build

      - name: Check artifact metadata
        if: steps.check.outputs.exists == 'false'
        run: twine check dist/*

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release with artifacts
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.check.outputs.version }}
          name: v${{ steps.check.outputs.version }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
